services:
  deeplearning-labs:
    build:
      context: .
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple/}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.org}
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - HOST=127.0.0.1
    volumes:
      - deeplearning-labs-uploads:/app/uploads
      - deeplearning-labs-outputs:/app/outputs
      - deeplearning-labs-projects:/app/projects
    restart: unless-stopped

volumes:
  deeplearning-labs-uploads:
  deeplearning-labs-outputs:
  deeplearning-labs-projects:
